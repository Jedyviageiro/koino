spring.application.name=backend

spring.datasource.url=jdbc:postgresql://localhost:5432/koino_db
spring.datasource.username=postgres
spring.datasource.password=secretpassword
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate settings to automatically create table based on models/entities created
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Override JWT_SECRET in every deployed environment. The value must be a Base64-encoded
# secret containing at least 32 bytes for HS256.
security.jwt.secret=${JWT_SECRET:a29pbm8tZGV2ZWxvcG1lbnQtand0LXNlY3JldC1jaGFuZ2UtbWUtMjAyNg==}
security.jwt.expiration=${JWT_EXPIRATION:PT24H}
security.password-reset.expiration=${PASSWORD_RESET_EXPIRATION:PT30M}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
