services:
  postgres:
    image: postgres:15-alpine
    container_name: koino_postgres
    restart: always
    environment:
      POSTGRES_DB: koino_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d koino_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    
  backend:
    build: ./backend
    container_name: koino_backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"
    environment:
      # Docker containers can talk to each other
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/koino_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=secretpassword
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - JWT_SECRET=${JWT_SECRET:-a29pbm8tZGV2ZWxvcG1lbnQtand0LXNlY3JldC1jaGFuZ2UtbWUtMjAyNg==}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/api/bible/books"]
      interval: 10s
      timeout: 5s
      start_period: 45s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: koino_frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
