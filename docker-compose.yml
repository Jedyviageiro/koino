version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: koino_postgres
    restart: always
    environment:
      POSTGRES_DB: koino_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
  backend:
    build: ./backend
    container_name: koino_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      # Docker containers can talk to each other
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/koino_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=secretpassword
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - JWT_SECRET=${JWT_SECRET:-a29pbm8tZGV2ZWxvcG1lbnQtand0LXNlY3JldC1jaGFuZ2UtbWUtMjAyNg==}
    depends_on:
      - postgres

volumes:
  postgres_data:
